<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Bill</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Restaurant Receipt</h1>

    <table border="1">
        <thead>
            <tr>
                <th>No.</th>
                <th>Menu</th>
                <th>Qty</th>
                <th>Price (Ks)</th>
                <th>Total (Ks)</th>
            </tr>
        </thead>
        <tbody id="billBody">
        </tbody>
    </table>

    <h2 id="grandTotal">Grand Total : 0 Ks</h2>

    <div style="text-align:center;">
        <button onclick="clearCart()" class="clear-btn">Clear Cart</button>

        <a href="index.html">
            <button>Back to Menu</button>
        </a>
    </div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let billBody = document.getElementById("billBody");
let grandTotal = 0;

cart.forEach((item,index)=>{

    let total = item.price * item.qty;
    grandTotal += total;

    billBody.innerHTML += 
        <tr>
            <td>${index+1}</td>
            <td>${item.name}</td>
            <td>${item.qty}</td>
            <td>${item.price}</td>
            <td>${total}</td>
        </tr>
    ;
});

document.getElementById("grandTotal").innerHTML =
"Grand Total : " + grandTotal + " Ks";

function clearCart(){

    if(confirm("Clear all items?")){

        localStorage.removeItem("cart");

        location.reload();
    }

}

</script>

</body>
</html>
