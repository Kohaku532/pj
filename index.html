<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Menu</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🍴 Restaurant Menu</h1>

<div class="customer">
    <label>Customer Phone Number</label><br>
    <input type="text" id="phone" placeholder="09xxxxxxxxx">
</div>

<div class="menu">

<div class="item">
    <h3>Fried Rice</h3>
    <p>5000 Ks</p>
    <button onclick="addToCart('Fried Rice',5000)">Add</button>
</div>

<div class="item">
    <h3>Chicken Burger</h3>
    <p>4500 Ks</p>
    <button onclick="addToCart('Chicken Burger',4500)">Add</button>
</div>

<div class="item">
    <h3>Pizza</h3>
    <p>8000 Ks</p>
    <button onclick="addToCart('Pizza',8000)">Add</button>
</div>

<div class="item">
    <h3>Noodles</h3>
    <p>4000 Ks</p>
    <button onclick="addToCart('Noodles',4000)">Add</button>
</div>

<div class="item">
    <h3>Coca Cola</h3>
    <p>1500 Ks</p>
    <button onclick="addToCart('Coca Cola',1500)">Add</button>
</div>

<div class="item">
    <h3>Orange Juice</h3>
    <p>2500 Ks</p>
    <button onclick="addToCart('Orange Juice',2500)">Add</button>
</div>

</div>

<br>

<div align="center">
    <button onclick="placeOrder()">Place Order</button>
</div>

<script src="script.js"></script>

</body>
</html>
