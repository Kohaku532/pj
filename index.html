<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 align="center">🍴 Restaurant Menu</h1>
<div id="menu-container">
  <!-- မီနူးစာရင်းတွေကို ပြပေးမယ့် နေရာ -->
  <h2>စားပွဲနံပါတ်: <span id="table-no">...</span></h2>
  
  <div class="menu-item">
    <p>ကြက်သားကော်ပြန့်ကြော် - ၂,၀၀၀ ကျပ်</p>
    <button onclick="addToCart('m101', 'ကြက်သားကော်ပြန့်ကြော်', 2000)">+ မှာမယ်</button>
  </div>
  
  <button id="submit-btn" onclick="placeOrder()">အော်ဒါတင်မယ်</button>
</div>
    <div class="menu">

        <div class="item">
            <h3>Fried Rice</h3>
            <p>Price : 5000 Ks</p>
            <button onclick="addToCart('Fried Rice',5000)">Add</button>
        </div>

        <div class="item">
            <h3>Chicken Burger</h3>
            <p>Price : 4500 Ks</p>
            <button onclick="addToCart('Chicken Burger',4500)">Add</button>
        </div>

        <div class="item">
            <h3>Pizza</h3>
            <p>Price : 8000 Ks</p>
            <button onclick="addToCart('Pizza',8000)">Add</button>
        </div>

        <div class="item">
            <h3>Noodles</h3>
            <p>Price : 4000 Ks</p>
            <button onclick="addToCart('Noodles',4000)">Add</button>
        </div>

        <div class="item">
            <h3>Coca Cola</h3>
            <p>Price : 1500 Ks</p>
            <button onclick="addToCart('Coca Cola',1500)">Add</button>
        </div>

        <div class="item">
            <h3>Orange Juice</h3>
            <p>Price : 2500 Ks</p>
            <button onclick="addToCart('Orange Juice',2500)">Add</button>
        </div>

    </div>

    <br><br>

    <div align="center">
        <a href="cart.html">
            <button>🛒 View Bill</button>
        </a>
    </div>

<script>

    let cart = [];
// URL ကနေ table number ကို ဖတ်မယ် (ဥပမာ- menu.html?table=5)
const urlParams = new URLSearchParams(window.location.search);
const tableNumber = urlParams.get('table') || "Unknown";
document.getElementById('table-no').innerText = tableNumber;

// Cart ထဲကို ပစ္စည်းထည့်တဲ့ function
window.addToCart = function(id, name, price) {
  cart.push({ menu_id: id, item_name: name, price: price, quantity: 1 });
  alert(${name} ကို Cart ထဲ ထည့်လိုက်ပါပြီ။);
}

// Database ထဲကို အော်ဒါ ပို့မည့် function
window.placeOrder = async function() {
  if (cart.length === 0) return alert("ကျေးဇူးပြု၍ မီနူးအရင်ရွေးချယ်ပါ။");
  
  const total = cart.reduce((sum, item) => sum + item.price, 0);

  try {
    const docRef = await addDoc(collection(db, "orders"), {
      table_number: tableNumber,
      items: cart,
      total_price: total,
      status: "pending",
      created_at: serverTimestamp()
    });

    alert("အော်ဒါ မှာယူမှု အောင်မြင်ပါသည်။");
    // မှာပြီးရင် Cart ကို ရှင်းလိုက်မယ်
    cart = []; 
  } catch (e) {
    console.error("Error: ", e);
  }
}
    
function addToCart(name, price){

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let found = cart.find(item => item.name === name);

    if(found){
        found.qty++;
    }else{
        cart.push({
            name: name,
            price: price,
            qty: 1
        });
    }

    localStorage.setItem("cart", JSON.stringify(cart));

    alert(name + " Added to Cart");
}

</script>

</body>
</html>
