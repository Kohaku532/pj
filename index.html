<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 align="center">🍴 Restaurant Menu</h1>

    <div class="menu">
        <div class="item">
            <h3>Fried Rice</h3>
            <p>Price : 5000 Ks</p>
            <button onclick="orderNow('Fried Rice', 5000)">Order Now</button>
        </div>
        <div class="item">
            <h3>Chicken Burger</h3>
            <p>Price : 4500 Ks</p>
            <button onclick="orderNow('Chicken Burger', 4500)">Order Now</button>
        </div>
        <div class="item">
            <h3>Pizza</h3>
            <p>Price : 8000 Ks</p>
            <button onclick="orderNow('Pizza', 8000)">Order Now</button>
        </div>
    </div>

    <!-- Firebase SDKs တွေကို ထည့်သွင်းခြင်း (v9 အဟောင်းပုံစံ Firebase compat Version နဲ့ ရေးပေးထားပါတယ်၊ HTML ထဲမှာ သုံးရလွယ်အောင်လို့ပါ) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <script>
        // ⚠️ ဒီနေရာမှာ သင့် Firebase Project settings ထဲက ရလာတဲ့ config နဲ့ အစားထိုးပါ
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        // Firebase ကို initialize လုပ်ခြင်း
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function orderNow(name, price) {
            // အော်ဒါအသစ်အတွက် နေရာတစ်ခု ယူလိုက်ခြင်း
            const orderRef = database.ref('orders').push();
            
            // Firebase ထဲကို Data လှမ်းထည့်ခြင်း
            orderRef.set({
                itemName: name,
                itemPrice: price,
                status: "Pending", // အော်ဒါအခြေအနေ
                timestamp: Date.now()
            }).then(() => {
                alert(name + " အတွက် အော်ဒါတင်ပြီးပါပြီ။");
            }).catch((error) => {
                console.error("Error: ", error);
            });
        }
    </script>
</body>
</html>
